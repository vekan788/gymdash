<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gr:ab Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f9fafb; font-family: 'Inter', sans-serif; }
        .bolt-green { color: #34bb78; }
        .bg-bolt { background-color: #34bb78; }
        .done { text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-2xl mx-auto">

    <header class="mb-8">
        <h1 class="text-3xl font-bold">Gr:ab <span class="bolt-green">Mission Control</span></h1>
        <p class="text-gray-500">March 12 – April 30, 2026</p>
        <div class="mt-4 bg-gray-200 h-3 rounded-full overflow-hidden">
            <div id="progressBar" class="bg-bolt h-full w-0 transition-all duration-500"></div>
        </div>
        <p id="progressText" class="text-xs text-gray-400 mt-1">0% Complete</p>
    </header>

    <div id="todoContainer" class="space-y-8">
        <!-- Week 1 -->
        <section>
            <h2 class="text-xl font-bold mb-4">Week 1: Stabilize & Fix</h2>
            <div class="space-y-2">
                <label class="flex items-center p-3 bg-white rounded-xl shadow-sm border border-gray-200">
                    <input type="checkbox" class="w-5 h-5 accent-bolt mr-3" onchange="update()">
                    <span class="text-sm">Fix map marker pins clipping</span>
                </label>
                <label class="flex items-center p-3 bg-white rounded-xl shadow-sm border border-gray-200">
                    <input type="checkbox" class="w-5 h-5 accent-bolt mr-3" onchange="update()">
                    <span class="text-sm">Test end-to-end on physical device</span>
                </label>
            </div>
        </section>
        <!-- Week 2, 3, 4, 5... could be added here dynamically -->
    </div>

    <script>
        function update() {
            const boxes = document.querySelectorAll('input[type="checkbox"]');
            const checked = document.querySelectorAll('input[type="checkbox"]:checked');
            const percent = (checked.length / boxes.length) * 100;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').innerText = Math.round(percent) + '% Complete';
            
            boxes.forEach(box => {
                if(box.checked) box.parentElement.classList.add('done');
                else box.parentElement.classList.remove('done');
            });
        }
    </script>
</body>
</html>
