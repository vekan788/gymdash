<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronTracker | Gym Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // UI Logic
            const overlay = document.getElementById('logFormOverlay');
            const card = document.getElementById('logFormCard');
            const openBtn = document.getElementById('openFormBtn');
            const closeBtn = document.getElementById('closeFormBtn');
            
            function toggleForm() {
                if (overlay.classList.contains('hidden')) {
                    overlay.classList.remove('hidden');
                    setTimeout(() => card.classList.remove('translate-y-full'), 10);
                } else {
                    card.classList.add('translate-y-full');
                    setTimeout(() => overlay.classList.add('hidden'), 300);
                }
            }

            if(openBtn) openBtn.addEventListener('click', toggleForm);
            if(closeBtn) closeBtn.addEventListener('click', toggleForm);

            // Supabase Initialization
            const _supabaseUrl = 'https://lweysacjbxyhisltfalb.supabase.co';
            const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3ZXlzYWNqYnh5aGlzbHRmYWxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzM2MDgsImV4cCI6MjA4OTI0OTYwOH0.5tsnaKmEbw4b4zGlJAzWFhYhkD98ZCzXghJvz2fkCOE';
            let supabase;
            try {
                supabase = window.supabase.createClient(_supabaseUrl, _supabaseKey);
            } catch(e) {
                console.error("Supabase load failed", e);
                document.getElementById('loadingText').innerText = "Database connection failed.";
                return; // Stop execution if DB fails so UI still works
            }

            let chartInstance = null;
            let allData = [];

            // Fetch Data
            async function fetchWorkouts() {
                const { data, error } = await supabase
                    .from('workouts')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error("Error fetching:", error);
                    document.getElementById('loadingText').innerText = "Error loading data.";
                    return;
                }
                
                allData = data || [];
                renderUI(allData);
            }

            // Render UI
            function renderUI(data) {
                const loadText = document.getElementById('loadingText');
                if(loadText) loadText.style.display = 'none';
                
                const logsList = document.getElementById('recentLogs');
                logsList.innerHTML = '';

                let totalVolume = 0;
                let maxWeight = 0;

                if (data.length === 0) {
                    logsList.innerHTML = '<li class="text-gym-muted text-sm text-center py-8">No workouts logged yet. Tap the + button to start.</li>';
                } else {
                    data.forEach(log => {
                        const volume = log.weight * log.reps * log.sets;
                        totalVolume += volume;
                        if (log.weight > maxWeight) maxWeight = log.weight;

                        const dateStr = new Date(log.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        const prBadge = log.is_pr ? `<span class="bg-gym-accent/20 text-gym-accent text-[10px] px-2 py-0.5 rounded-full ml-2 uppercase font-bold tracking-wider border border-gym-accent/50">PR</span>` : '';
                        
                        logsList.innerHTML += `
                            <li class="flex justify-between items-center border-b border-slate-700 pb-3 mb-3 last:border-0">
                                <div>
                                    <p class="font-medium text-gym-text">${log.exercise_name} ${prBadge}</p>
                                    <p class="text-xs text-gym-muted">${dateStr}</p>
                                </div>
                                <div class="text-right">
                                    <p class="font-bold text-gym-accent">${log.weight} kg</p>
                                    <p class="text-xs text-gym-muted">${log.sets}x${log.reps}</p>
                                </div>
                            </li>
                        `;
                    });
                }

                document.getElementById('statVolume').innerHTML = `${totalVolume.toLocaleString()} <span class="text-sm text-gym-muted font-normal">kg</span>`;
                document.getElementById('statWorkouts').innerText = data.length;
                document.getElementById('statSquat').innerHTML = `${maxWeight} <span class="text-sm text-gym-muted font-normal">kg</span>`;

                updateChart(document.getElementById('chartSelector').value || 'Squat');
            }

            // Submit Logic
            async function submitLog() {
                const btn = document.getElementById('submitBtn');
                const exercise = document.getElementById('inputExercise').value;
                const weight = parseFloat(document.getElementById('inputWeight').value);
                const reps = parseInt(document.getElementById('inputReps').value);
                const sets = parseInt(document.getElementById('inputSets').value);
                const is_pr = document.getElementById('inputPR').checked;

                if(!weight || !reps || !sets) { alert("Please fill all fields"); return; }

                btn.innerHTML = "Saving...";
                btn.classList.add("opacity-50");

                const { data, error } = await supabase
                    .from('workouts')
                    .insert([{ exercise_name: exercise, weight: weight, reps: reps, sets: sets, is_pr: is_pr }]);

                if (error) {
                    alert("Error saving data: " + error.message);
                    console.error(error);
                } else {
                    document.getElementById('inputWeight').value = '';
                    document.getElementById('inputReps').value = '';
                    document.getElementById('inputPR').checked = false;
                    toggleForm();
                    fetchWorkouts(); 
                }
                
                btn.innerHTML = "Save to Database";
                btn.classList.remove("opacity-50");
            }

            // Attach Submit Listener
            const submitBtn = document.getElementById('submitBtn');
            if(submitBtn) {
                // remove inline onclick first if it exists
                submitBtn.removeAttribute('onclick'); 
                submitBtn.addEventListener('click', submitLog);
            }

            // Chart Logic
            function updateChart(exerciseName) {
                const filteredData = allData.filter(d => d.exercise_name === exerciseName).reverse();
                const labels = filteredData.map((_, i) => `S${i+1}`);
                const weights = filteredData.map(d => d.weight);

                const ctx = document.getElementById('strengthChart').getContext('2d');
                if(chartInstance) { chartInstance.destroy(); }

                const gradient = ctx.createLinearGradient(0, 0, 0, 300);
                gradient.addColorStop(0, 'rgba(34, 197, 94, 0.5)');
                gradient.addColorStop(1, 'rgba(34, 197, 94, 0)');

                chartInstance = new window.Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels.length > 0 ? labels : ['No Data'],
                        datasets: [{
                            label: `${exerciseName} Weight (kg)`,
                            data: weights.length > 0 ? weights : [0],
                            borderColor: '#22c55e', backgroundColor: gradient,
                            borderWidth: 3, fill: true, tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                            x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                        }
                    }
                });
            }

            const chartSel = document.getElementById('chartSelector');
            if(chartSel) chartSel.addEventListener('change', (e) => updateChart(e.target.value));

            // Load initially
            fetchWorkouts();
        });
    </script>

</body>
</html>
